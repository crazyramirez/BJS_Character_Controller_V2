<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJS Character Controller V2</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="loading">
    <h1>BJS Character Controller V2</h1>
    <p>BABYLONJS 9 · MIXAMO · AAA CONTROLLER</p>
    <div class="bar-bg">
      <div class="bar" id="bar"></div>
    </div>
    <div class="bar-label" id="bar-label">Initializing...</div>
  </div>

  <canvas id="c"></canvas>

  <!-- MOBILE TOUCH CONTROLS -->
  <div id="mobile-ctrls">
    <div id="joystick-zone">
      <div id="joystick-ring">
        <div id="joystick-knob"></div>
      </div>
    </div>
    <div id="action-btns">
      <button id="btn-sprint" class="touch-btn">SPRINT</button>
      <button id="btn-jump" class="touch-btn">JUMP</button>
      <button id="btn-roll" class="touch-btn">ROLL</button>
      <button id="btn-crouch" class="touch-btn">CROUCH</button>
      <button id="btn-act" class="touch-btn">ACT</button>
      <button id="btn-spell" class="touch-btn">SPELL</button>
    </div>
  </div>

  <div id="xhair"></div>
  <div id="combo"></div>

  <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js"></script>

  <!-- Character Controller V2 - Custom Scripts -->
  <script src="js/custom-pointer.js"></script>
  <script src="js/custom-hud.js"></script>
  <script src="js/character-controller.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
