<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJS Character Controller V2</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="loading">
    <h1>BJS Character Controller V2</h1>
    <p>BABYLONJS 9 · MIXAMO · AAA CONTROLLER</p>
    <div class="bar-bg">
      <div class="bar" id="bar"></div>
    </div>
    <div class="bar-label" id="bar-label">Initializing...</div>
  </div>

  <canvas id="c"></canvas>

  <!-- MOBILE TOUCH CONTROLS -->
  <div id="mobile-ctrls">
    <div id="joystick-zone">
      <div id="joystick-ring">
        <div id="joystick-knob"></div>
      </div>
    </div>
    <div id="action-btns">
      <button id="btn-sprint" class="touch-btn">SPRINT</button>
      <button id="btn-jump" class="touch-btn">JUMP</button>
      <button id="btn-roll" class="touch-btn">ROLL</button>
      <button id="btn-crouch" class="touch-btn">CROUCH</button>
      <button id="btn-act" class="touch-btn">ACT</button>
      <button id="btn-spell" class="touch-btn">SPELL</button>
    </div>
  </div>

  <div id="hud">
    <div class="panel main-panel">
      <button id="hud-toggle" aria-label="Toggle HUD">
        <svg class="toggle-icon" viewBox="0 0 24 24">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </button>
      <div class="hud-content">
        <div class="state-label">State</div>
        <div class="state-val" id="hud-state">IDLE</div>
        <div class="state-label" style="margin-top:4px">Animation</div>
        <div class="anim-val" id="hud-anim">—</div>
        <div class="weapon-val" id="hud-weapon"></div>
        <div class="speed-val" id="hud-speed"></div>
        <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #aeb4ff; font-weight: 500;">
          <span style="color: #00ff99; font-weight: bold; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;">Tip:</span> Press <span style="background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-family: monospace; color:#fff; font-size: 10px;">Space</span> in air to queue a <span style="color:#ffcc00; font-weight: 600;">Double Jump (Landing Roll)</span>
        </div>
      </div>
    </div>
    <div class="panel keys-grid">
      <div class="krow"><span>W A S D</span>Move</div>
      <div class="krow"><span>Shift</span>Sprint</div>
      <div class="krow"><span>Ctrl</span>Crouch</div>
      <div class="krow"><span>Space</span>Jump</div>
      <div class="krow"><span>R</span>Roll</div>
      <div class="krow"><span>Q</span>Punch</div>
      <div class="krow"><span>E</span>Spell</div>
      <div class="krow"><span>F</span>Function</div>
    </div>
  </div>

  <div id="xhair"></div>
  <div id="combo"></div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js"></script>
  <script src="js/character-controller.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
